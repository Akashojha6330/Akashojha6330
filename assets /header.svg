<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" width="900" height="320">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#020817"/>
      <stop offset="50%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#020817"/>
    </linearGradient>
    <filter id="glow20">
      <feGaussianBlur stdDeviation="28"/>
    </filter>
    <filter id="glow10">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.13"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="border" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1f6feb" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#58a6ff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#1f6feb" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#020817" stop-opacity="1"/>
      <stop offset="30%" stop-color="#1f6feb" stop-opacity="0.8"/>
      <stop offset="70%" stop-color="#58a6ff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#020817" stop-opacity="1"/>
    </linearGradient>
    <clipPath id="cardClip">
      <rect x="18" y="18" width="864" height="284" rx="22"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="900" height="320" fill="url(#bg)"/>

  <!-- Animated glowing blobs (glassmorphism base) -->
  <g clip-path="url(#cardClip)">
    <circle cx="160" cy="160" r="140" fill="#1d4ed8" opacity="0.40" filter="url(#glow20)">
      <animateTransform attributeName="transform" type="translate" values="0,0;35,25;0,0" dur="9s" repeatCount="indefinite"/>
    </circle>
    <circle cx="740" cy="160" r="130" fill="#2563eb" opacity="0.30" filter="url(#glow20)">
      <animateTransform attributeName="transform" type="translate" values="0,0;-30,15;0,0" dur="11s" repeatCount="indefinite"/>
    </circle>
    <circle cx="450" cy="50" r="100" fill="#3b82f6" opacity="0.22" filter="url(#glow20)">
      <animateTransform attributeName="transform" type="translate" values="0,0;15,-20;0,0" dur="7s" repeatCount="indefinite"/>
    </circle>
    <circle cx="450" cy="290" r="80" fill="#1f6feb" opacity="0.18" filter="url(#glow20)">
      <animateTransform attributeName="transform" type="translate" values="0,0;-10,10;0,0" dur="8s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Glass card -->
  <rect x="18" y="18" width="864" height="284" rx="22" fill="url(#glass)"/>
  <rect x="18" y="18" width="864" height="284" rx="22" fill="none" stroke="url(#border)" stroke-width="1.5"/>

  <!-- Top glass reflection shine -->
  <rect x="19" y="19" width="862" height="55" rx="21" fill="white" opacity="0.045"/>

  <!-- Subtle grid texture lines -->
  <line x1="18" y1="90" x2="882" y2="90" stroke="#58a6ff" stroke-width="0.3" opacity="0.12"/>
  <line x1="18" y1="220" x2="882" y2="220" stroke="#58a6ff" stroke-width="0.3" opacity="0.10"/>

  <!-- Floating dot particles -->
  <circle cx="80" cy="60" r="2" fill="#58a6ff" opacity="0.4">
    <animate attributeName="opacity" values="0.4;0.9;0.4" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="820" cy="260" r="2" fill="#58a6ff" opacity="0.4">
    <animate attributeName="opacity" values="0.4;0.9;0.4" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="820" cy="60" r="1.5" fill="#1f6feb" opacity="0.5">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="80" cy="260" r="1.5" fill="#1f6feb" opacity="0.5">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="3.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Corner brackets decorative -->
  <path d="M30 45 L30 30 L45 30" fill="none" stroke="#58a6ff" stroke-width="1.5" opacity="0.6"/>
  <path d="M855 30 L870 30 L870 45" fill="none" stroke="#58a6ff" stroke-width="1.5" opacity="0.6"/>
  <path d="M30 275 L30 290 L45 290" fill="none" stroke="#58a6ff" stroke-width="1.5" opacity="0.6"/>
  <path d="M855 290 L870 290 L870 275" fill="none" stroke="#58a6ff" stroke-width="1.5" opacity="0.6"/>

  <!-- Name text with glow -->
  <text x="450" y="128" text-anchor="middle"
        font-family="'Segoe UI',Arial,sans-serif"
        font-size="60" font-weight="700" fill="#58a6ff" letter-spacing="4"
        filter="url(#glow10)" opacity="0.4">
    Akash Ojha
  </text>
  <text x="450" y="128" text-anchor="middle"
        font-family="'Segoe UI',Arial,sans-serif"
        font-size="60" font-weight="700" fill="#58a6ff" letter-spacing="4">
    Akash Ojha
    <animate attributeName="opacity" from="0" to="1" dur="1.5s" fill="freeze"/>
  </text>

  <!-- Subtitle -->
  <text x="450" y="172" text-anchor="middle"
        font-family="'Segoe UI',Arial,sans-serif"
        font-size="16" fill="#94a3b8" letter-spacing="3">
    ML Engineer  ·  Full-Stack Dev  ·  Fintech Builder
    <animate attributeName="opacity" from="0" to="1" dur="2s" begin="0.6s" fill="freeze"/>
  </text>

  <!-- Animated gradient separator line -->
  <line x1="450" y1="195" x2="450" y2="195" stroke="url(#line)" stroke-width="1" opacity="0.8">
    <animate attributeName="x1" from="450" to="200" dur="0.9s" begin="1s" fill="freeze"/>
    <animate attributeName="x2" from="450" to="700" dur="0.9s" begin="1s" fill="freeze"/>
    <animate attributeName="opacity" from="0" to="0.8" dur="0.9s" begin="1s" fill="freeze"/>
  </line>

  <!-- Stats row -->
  <!-- Stat 1 -->
  <text x="210" y="240" text-anchor="middle"
        font-family="'Segoe UI',Arial,sans-serif"
        font-size="26" font-weight="700" fill="#58a6ff">
    Top 9%
    <animate attributeName="opacity" from="0" to="1" dur="1s" begin="1.4s" fill="freeze"/>
  </text>
  <text x="210" y="262" text-anchor="middle"
        font-family="Arial,sans-serif" font-size="12" fill="#64748b">
    GSSoC 2026
    <animate attributeName="opacity" from="0" to="1" dur="1s" begin="1.4s" fill="freeze"/>
  </text>

  <!-- Vertical divider 1 -->
  <line x1="330" y1="225" x2="330" y2="270" stroke="#1f6feb" stroke-width="1" opacity="0.4">
    <animate attributeName="opacity" from="0" to="0.4" dur="1s" begin="1.4s" fill="freeze"/>
  </line>

  <!-- Stat 2 -->
  <text x="450" y="240" text-anchor="middle"
        font-family="'Segoe UI',Arial,sans-serif"
        font-size="26" font-weight="700" fill="#58a6ff">
    AUC 0.98
    <animate attributeName="opacity" from="0" to="1" dur="1s" begin="1.6s" fill="freeze"/>
  </text>
  <text x="450" y="262" text-anchor="middle"
        font-family="Arial,sans-serif" font-size="12" fill="#64748b">
    Sentinel AI Score
    <animate attributeName="opacity" from="0" to="1" dur="1s" begin="1.6s" fill="freeze"/>
  </text>

  <!-- Vertical divider 2 -->
  <line x1="570" y1="225" x2="570" y2="270" stroke="#1f6feb" stroke-width="1" opacity="0.4">
    <animate attributeName="opacity" from="0" to="0.4" dur="1s" begin="1.6s" fill="freeze"/>
  </line>

  <!-- Stat 3 -->
  <text x="690" y="240" text-anchor="middle"
        font-family="'Segoe UI',Arial,sans-serif"
        font-size="26" font-weight="700" fill="#58a6ff">
    15+ LPA
    <animate attributeName="opacity" from="0" to="1" dur="1s" begin="1.8s" fill="freeze"/>
  </text>
  <text x="690" y="262" text-anchor="middle"
        font-family="Arial,sans-serif" font-size="12" fill="#64748b">
    Target CTC
    <animate attributeName="opacity" from="0" to="1" dur="1s" begin="1.8s" fill="freeze"/>
  </text>

  <!-- Bottom tag strip -->
  <text x="450" y="295" text-anchor="middle"
        font-family="monospace" font-size="11" fill="#1f6feb" letter-spacing="4" opacity="0.7">
    BLUESTOCK · GSSOC · PATENT · LPU · SENTINEL-AI
    <animate attributeName="opacity" from="0" to="0.7" dur="1s" begin="2s" fill="freeze"/>
  </text>
</svg>
